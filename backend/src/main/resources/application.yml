server:
  port: ${PORT:8080}

spring:
  application:
    name: anchor-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/anchor}
    username: ${DB_USER:anchor}
    password: ${DB_PASSWORD:anchor}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true

anchor:
  supabase:
    url: ${SUPABASE_URL:}
    # HS256 legacy JWT secret. Leave empty to validate against the project's JWKS endpoint instead.
    jwt-secret: ${SUPABASE_JWT_SECRET:}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:4200}
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@example.com}

management:
  endpoints:
    web:
      exposure:
        include: health
