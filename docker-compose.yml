services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anchor
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
    ports:
      - "5432:5432"
    volumes:
      - anchor-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/anchor
      DB_USER: anchor
      DB_PASSWORD: anchor
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:you@example.com}
    ports:
      - "8080:8080"

volumes:
  anchor-db:
