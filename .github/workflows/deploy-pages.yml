name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Inject environment from secrets
        working-directory: frontend
        run: |
          sed -i "s|__API_URL__|${{ secrets.API_URL }}|g" src/environments/environment.production.ts
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" src/environments/environment.production.ts
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" src/environments/environment.production.ts
          sed -i "s|__VAPID_PUBLIC_KEY__|${{ secrets.VAPID_PUBLIC_KEY }}|g" src/environments/environment.production.ts

      - name: Build
        working-directory: frontend
        run: npx ng build --base-href "/${{ github.event.repository.name }}/"

      - name: SPA fallback
        run: cp frontend/dist/anchor/browser/index.html frontend/dist/anchor/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/anchor/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
