# Render's free tier spins the API down after ~15 minutes of idle traffic.
# A sleeping API is fine for capture (the PWA works offline) but the daily
# Ageing Digest scheduler only runs while the process is up, so this pings
# the health endpoint to keep it awake.
name: Keep API awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -n "${{ secrets.API_URL }}" ]; then
            curl -fsS --max-time 60 "${{ secrets.API_URL }}/actuator/health" || true
          fi
